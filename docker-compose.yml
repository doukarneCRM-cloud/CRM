version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anaqatoki_db
    environment:
      POSTGRES_USER: anaqatoki
      POSTGRES_PASSWORD: anaqatoki_dev
      POSTGRES_DB: anaqatoki
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U anaqatoki']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anaqatoki_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
